version: "3.8"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tours-app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3003
      RUN_DB_GENERATE: "false"
      RUN_DB_MIGRATIONS: "false"
      RUN_DB_PUSH: "false"
    ports:
      - "45632:3003"
    volumes:
      - ./uploads:/app/uploads
